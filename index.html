<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mixed Team Builder</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
margin:0;
background:#f4f6f8;
color:#333;
}

.container{
max-width:650px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
font-size:24px;
margin-bottom:20px;
}

.section{
background:white;
padding:16px;
border-radius:10px;
margin-bottom:16px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.label{
font-weight:bold;
margin-bottom:6px;
display:block;
}

select{
width:100%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:14px;
}

option.invalid{
color:red;
}

.results{
position:sticky;
bottom:0;
background:white;
padding:16px;
border-top:1px solid #ddd;
box-shadow:0 -2px 8px rgba(0,0,0,0.1);
}

.total{
font-size:22px;
font-weight:bold;
}

.avg{
color:#666;
margin-top:4px;
}

.warning{
color:red;
font-weight:bold;
margin-top:8px;
}

@media (min-width:700px){

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Mixed Doubles Team Builder</h1>

<div class="grid">

<div class="section">

<div class="label">Male Player 1</div>
<select id="male1"></select>

<div class="label">Male Player 2</div>
<select id="male2"></select>

</div>

<div class="section">

<div class="label">Female Player 1</div>
<select id="female1"></select>

<div class="label">Female Player 2</div>
<select id="female2"></select>

</div>

</div>

</div>

<div class="results">

<div class="total">
Total DUPR: <span id="total">0</span>
</div>

<div class="avg">
Average DUPR: <span id="avg">0</span>
</div>

<div id="warning" class="warning"></div>

</div>

<script>

`

let males=[]
let females=[]

function parseCSV(){

const rows = csvData.trim().split("\n").slice(1)

rows.forEach(r=>{

const c = r.split(",")

let duprRaw = c[4].trim()

let dupr = (duprRaw === "NR" || duprRaw === "") ? 3.0 : parseFloat(duprRaw)

const player={
name:c[0],
sex:c[1],
dupr:dupr
}

if(player.sex==="Male"){
males.push(player)
}else{
females.push(player)
}

})

render()

}

function render(){

populate("male1",males)
populate("male2",males)
populate("female1",females)
populate("female2",females)

}

function populate(id,list){

const select=document.getElementById(id)

select.innerHTML=""

let blank=document.createElement("option")
blank.value=""
blank.text="Select Player"
select.appendChild(blank)

list.forEach(p=>{

let option=document.createElement("option")

option.value=p.dupr
option.text=p.name+" ("+p.dupr.toFixed(2)+")"
option.dataset.name=p.name

select.appendChild(option)

})

select.addEventListener("change",update)

}

function update(){

validateOptions()
compute()

}

function validateOptions(){

const players={
male1:getPlayer("male1"),
male2:getPlayer("male2"),
female1:getPlayer("female1"),
female2:getPlayer("female2")
}

validatePair("male1","male2",players)
validatePair("male2","male1",players)

validatePair("female1","female2",players)
validatePair("female2","female1",players)

validateTotal(players)

}

function validatePair(currentId,otherId,players){

const current=players[currentId]
const otherSelect=document.getElementById(otherId)

Array.from(otherSelect.options).forEach(opt=>{

opt.classList.remove("invalid")
opt.disabled=false

if(!opt.value) return

const name=opt.dataset.name
const dupr=parseFloat(opt.value)

if(current && name===current.name){
opt.disabled=true
opt.classList.add("invalid")
return
}

if(current && current.dupr+dupr>8){
opt.disabled=true
opt.classList.add("invalid")
}

})

}

function validateTotal(players){

let total=0

Object.values(players).forEach(p=>{
if(p) total+=p.dupr
})

const ids=["male1","male2","female1","female2"]

ids.forEach(id=>{

const select=document.getElementById(id)

Array.from(select.options).forEach(opt=>{

if(!opt.value) return

const dupr=parseFloat(opt.value)

let hypothetical=total

const current=getPlayer(id)

if(current) hypothetical-=current.dupr

hypothetical+=dupr

if(hypothetical>12){

opt.disabled=true
opt.classList.add("invalid")

}

})

})

}

function getPlayer(id){

const select=document.getElementById(id)
const option=select.options[select.selectedIndex]

if(!option || !option.value) return null

return {
name:option.dataset.name,
dupr:parseFloat(option.value)
}

}

function compute(){

let players=[
getPlayer("male1"),
getPlayer("male2"),
getPlayer("female1"),
getPlayer("female2")
]

let total=players.reduce((s,p)=>s+(p?p.dupr:0),0)

document.getElementById("total").innerText=total.toFixed(2)
document.getElementById("avg").innerText=(total/4).toFixed(2)

if(total>12){
document.getElementById("warning").innerText="Team exceeds DUPR 12 limit"
}else{
document.getElementById("warning").innerText=""
}

}

parseCSV()

</script>

</body>
</html>
